name: "Test Mettascope"
on:
  pull_request:
    paths:
      - "mettascope/**"
      - ".github/workflows/test-mettascope.yml"
  workflow_dispatch: {}

jobs:
  ui-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/metta-ai/metta/mettascope-ci:pr-1638 # switch to latest after push to main
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node dependencies
        run: |
          cd mettascope
          # Use npm ci if lock file exists and is in sync, otherwise use npm install
          if [ -f "package-lock.json" ]; then
            npm ci || npm install
          else
            npm install
          fi

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          install-mode: "minimal"

      - name: Install Mettascope
        run: |
          ./mettascope/install.sh

      - name: Run quick training job for basic replay data
        run: |
          uv run tools/train.py trainer.total_timesteps=10 run=smoke_test +hardware=github wandb=off

      - name: Generate replay
        run: |
          uv run tools/replay.py run=smoke_test +hardware=github wandb=off

      - name: Run mettascope playwright tests
        run: |
          # start the backend
          uv run tools/play.py run=smoke_test +hardware=github wandb=off replay_job.open_browser_on_start=false &
          echo "Started backend"

          # wait for server to be ready
          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:8000 >/dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            echo "Attempt $i: Server not ready yet, waiting..."
            sleep 2
          done

          cd mettascope
          npm run test

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !env.ACT }} # skip when testing locally with `act`
        with:
          name: playwright-test-results
          path: mettascope/tests/test-results/
          retention-days: 30
