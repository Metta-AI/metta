version: '3.8'

services:
  eval-worker-orchestrator:
    build:
      context: .
      dockerfile: devops/docker/Dockerfile.eval_worker
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://host.docker.internal:8000}
      - WORKER_IDLE_TIMEOUT=${WORKER_IDLE_TIMEOUT:-600}
      - PYTHONPATH=/workspace/metta
    volumes:
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount train_dir for policy access
      - ./train_dir:/workspace/train_dir
      # Mount the code for development
      - ./:/workspace/metta
    command: ["python", "tools/eval_worker_orchestrator.py"]
    network_mode: "host"  # Use host network to access backend on localhost
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Backend service for local testing
  backend:
    profiles: ["with-backend"]  # Only start if --profile with-backend is used
    build:
      context: ./app_backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URI=postgresql://postgres:password@postgres:5432/postgres
      - JWT_SECRET=test-secret-key
    depends_on:
      - postgres
    
  postgres:
    profiles: ["with-backend"]
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: