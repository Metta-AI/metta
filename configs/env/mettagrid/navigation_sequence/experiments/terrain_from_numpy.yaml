defaults:
  - /env/mettagrid/mettagrid_deterministic@
  - _self_

game:
  num_agents: 4
  agent:
    ore.red_max: 5
    battery.red_max: 5
    rewards:
      action_failure_penalty: 0
      ore.red: 0.005
      battery.red: 0.01
      heart: 1
      heart_max: 1000
  map_builder:
    _target_: mettagrid.room.multi_room.MultiRoom
    num_rooms: 4
    border_width: 6
    room:
      _target_: mettagrid.room.terrain_from_numpy.TerrainFromNumpy
      border_width: 1
      agents: 1
      objects:
        mine.red: 3
        generator.red: 3
        altar: 5
  objects:
    altar:
      input_battery.red: 1
      initial_items: 0
      cooldown: 10
    generator.red:
      initial_items: 0
      cooldown: 15
    mine.red:
      cooldown: 15
