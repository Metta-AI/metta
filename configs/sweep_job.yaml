defaults:
  - common
  - wandb: metta_research
  - agent: fast
  - sim: sweep_eval
  - trainer: trainer
  - sweep: quick
  - _self_

cmd: sweep
sweep_run: ???

# Use default device (GPU if available)
# device: cpu  # Uncomment for CPU-only training

trainer:
  # Ultra-fast training configuration for testing sweep
  total_timesteps: 5000  # Very minimal training for quick testing
  evaluate_interval: 1000  # Evaluate frequently
  batch_size: 3200  # Small batch size for quick training
  minibatch_size: 1600  # Small minibatch size
  checkpoint_interval: 1000  # Checkpoint frequently for testing
  wandb_checkpoint_interval: 1000  # Upload frequently for testing
  curriculum: /env/mettagrid/curriculum/simple
  forward_pass_minibatch_target_size: 256  # Small target size for quick training
  async_factor: 1  # Single async factor for simplicity
  env_overrides:
    game:
      max_steps: 50  # Very short episodes for quick testing
      num_agents: 4  # Fewer agents for faster training

sim:
  name: sweep_eval  # Required field
  num_episodes: 5  # Very few episodes for quick testing
  max_time_s: 60  # 1 minute for quick evaluation
  env_overrides: {}
  simulations:
    simple:
      env: env/mettagrid/simple

sweep_job:
  evals: ${sim}
  trainer: ${trainer}
  agent: ${agent}
  sweep: ${sweep}
  # device: cpu  # Uncomment for CPU-only training
  sweep_run: ???  # Sweep base name (e.g., "simple_sweep")

sweep_dir: "${.data_dir}/sweep/${.sweep_run}"
runs_dir: "${.sweep_dir}/runs"
