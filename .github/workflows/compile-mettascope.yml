name: "Compile Mettascope"
on:
  push:
    paths:
      - "mettascope/**"
      - ".github/workflows/**"
  workflow_dispatch: {}

jobs:
  compile-mettascope:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          install-mode: "minimal"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mettascope/package-lock.json

      - name: Install Mettascope
        run: |
          ./mettascope/install.sh
