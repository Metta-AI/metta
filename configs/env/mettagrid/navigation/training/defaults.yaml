defaults:
  - /env/mettagrid/mettagrid_deterministic@
  - _self_

game:
  num_agents: 4
  map_builder:
    _target_: mettagrid.room.multi_room.MultiRoom
    num_rooms: ${..num_agents}
    border_width: 6
    room:
      agents: ${div:${...num_agents},${..num_rooms}}
      border_width: 2
  objects:
    altar:
      cooldown: 1000
      initial_items: 1
